name: phish-detect
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12                    # Latest stable, well-supported (SPEC0 compliant)
  - pandas>=2.1.0                  # Latest stable, works with Python 3.12
  - numpy>=1.26.0                  # Required for pandas 2.x compatibility
  - matplotlib>=3.3.4              # Minimum for scikit-learn compatibility
  - seaborn>=0.12.0                # Modern API, works with pandas 2.x
  - scikit-learn>=1.6.0            # Latest stable for ML models later
  - jupyter                        # Comes with ipykernel automatically
  - pip                            # For pip-installed packages
  - pip:
      - tldextract>=3.4.0           # For URL parsing, latest stable